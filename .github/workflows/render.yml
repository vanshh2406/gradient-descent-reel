- name: Checkout Repo
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.11"

- name: Install System Dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y \
      ffmpeg \
      pkg-config \
      libcairo2-dev \
      libpango1.0-dev \
      pango1.0-tools

- name: Install Manim
  run: |
    pip install manim==0.20.1

- name: Render
  run: |
    manim -pql gradient_descent_reel.py GradientDescentReel
        with:
          name: rendered-video
          path: media/videos/
