name: Render Manim Reel

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev pkg-config pango1.0-tools libpango1.0-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Manim
        run: |
          pip install manim

      - name: Render Video
        run: |
          manim -qh --resolution 1080,1920 --fps 60 ai_gradient_descent_reel.py AIGradientDescentReel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradient-descent-video
          path: media/videos/
